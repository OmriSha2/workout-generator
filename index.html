<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מחולל תוכנית אימון | עומרי שגן כושר אישי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-light:#E1F5EE;
  --blue:#3B6BF7;--blue-light:#EEF2FE;
  --text:#1C1C1E;--muted:#6B6B6B;--subtle:#A0A0A0;
  --bg:#F5F5F7;--card:#FFFFFF;--border:rgba(0,0,0,0.09);
  --radius:14px;--radius-sm:8px;
}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem}
.wrap{max-width:640px;margin:0 auto}

/* header */
.header{text-align:center;margin-bottom:2rem}
.logo{font-size:13px;font-weight:600;color:var(--green);letter-spacing:0.04em;text-transform:uppercase;margin-bottom:8px}
.header h1{font-size:26px;font-weight:700;margin-bottom:6px;letter-spacing:-0.5px}
.header p{font-size:14px;color:var(--muted);line-height:1.5}

/* form card */
.form-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:1.5rem;margin-bottom:1rem}
.form-card h2{font-size:15px;font-weight:600;margin-bottom:1.25rem;color:var(--text)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.03em}
.field select{width:100%;direction:rtl;font-family:'Heebo',sans-serif;font-size:14px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--text);appearance:none;-webkit-appearance:none;cursor:pointer}
.field select:focus{outline:none;border-color:var(--blue)}
.field-full{grid-column:1/-1}

.btn{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:600;cursor:pointer;font-family:'Heebo',sans-serif;margin-top:4px;transition:opacity 0.15s;letter-spacing:-0.2px}
.btn:hover{opacity:0.9}
.btn:disabled{opacity:0.5;cursor:not-allowed}

/* loading */
.loading{text-align:center;padding:3rem 1rem;display:none}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:14px;color:var(--muted)}

/* result */
.result{display:none}
.result-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;gap:12px}
.result-title{font-size:18px;font-weight:700;margin-bottom:4px}
.result-summary{font-size:13px;color:var(--muted);line-height:1.5}
.btn-new{padding:8px 16px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Heebo',sans-serif;cursor:pointer;white-space:nowrap;color:var(--muted)}
.btn-new:hover{background:var(--bg)}

/* day card */
.day-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:1.25rem;margin-bottom:10px;overflow:hidden}
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.day-name{font-size:15px;font-weight:700}
.day-focus{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.focus-upper{background:var(--blue-light);color:var(--blue)}
.focus-lower{background:var(--green-light);color:var(--green)}
.focus-full{background:#FFF3E0;color:#E65100}
.focus-cardio{background:#FCE4EC;color:#C2185B}

.warmup{background:var(--bg);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;color:var(--muted);margin-bottom:12px}
.warmup strong{color:var(--text);font-weight:600}

table{width:100%;border-collapse:collapse;font-size:13px}
thead th{font-size:11px;font-weight:600;color:var(--subtle);text-align:right;padding:0 4px 8px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.03em}
thead th.c{text-align:center}
tbody td{padding:8px 4px;border-bottom:1px solid var(--border);vertical-align:top}
tbody tr:last-child td{border-bottom:none}
td.c{text-align:center}
.ex-name{font-weight:600;margin-bottom:2px}
.ex-note{font-size:11px;color:var(--muted);line-height:1.4}
.sets-val{font-size:14px;font-weight:600;color:var(--text);text-align:center}
.reps-val{font-size:13px;color:var(--muted);text-align:center}

/* footer */
.credit{text-align:center;font-size:12px;color:var(--subtle);margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.credit strong{color:var(--text)}

.err{background:#FEE2E2;border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:#B91C1C;margin-top:10px;display:none}

@media(max-width:480px){.grid{grid-template-columns:1fr}.result-header{flex-direction:column}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">עומרי שגן · כושר אישי</div>
    <h1>מחולל תוכנית אימון שבועית</h1>
    <p>בחרו את הפרמטרים וקבלו תוכנית מותאמת אישית</p>
  </div>

  <div class="form-card" id="formSection">
    <h2>פרטי המתאמן</h2>
    <div class="grid">
      <div class="field">
        <label>גיל</label>
        <select id="age">
          <option value="6-9">6–9</option>
          <option value="10-13">10–13</option>
          <option value="14-17" selected>14–17</option>
        </select>
      </div>
      <div class="field">
        <label>רמה</label>
        <select id="level">
          <option value="מתחיל">מתחיל</option>
          <option value="בינוני" selected>בינוני</option>
          <option value="מתקדם">מתקדם</option>
        </select>
      </div>
      <div class="field">
        <label>מטרה עיקרית</label>
        <select id="goal">
          <option value="כושר גופני כללי">כושר גופני כללי</option>
          <option value="ירידה במשקל">ירידה במשקל</option>
          <option value="חיזוק שרירים">חיזוק שרירים</option>
          <option value="שיפור ביצועים בכדורגל">שיפור בכדורגל</option>
        </select>
      </div>
      <div class="field">
        <label>ימים בשבוע</label>
        <select id="days">
          <option value="2">2 ימים</option>
          <option value="3" selected>3 ימים</option>
          <option value="4">4 ימים</option>
          <option value="5">5 ימים</option>
        </select>
      </div>
      <div class="field">
        <label>ציוד זמין</label>
        <select id="equipment">
          <option value="ללא ציוד (משקל גוף בלבד)">ללא ציוד</option>
          <option value="כדור כדורגל בלבד" selected>כדור כדורגל</option>
          <option value="גומיות התנגדות">גומיות התנגדות</option>
          <option value="חדר כושר מאובזר">חדר כושר מאובזר</option>
        </select>
      </div>
      <div class="field">
        <label>משך אימון</label>
        <select id="duration">
          <option value="20 דקות">20 דקות</option>
          <option value="40 דקות" selected>40 דקות</option>
          <option value="60 דקות">60 דקות</option>
        </select>
      </div>
    </div>
    <button class="btn" id="btnGen" onclick="generate()">✦ צור תוכנית אימון</button>
    <div class="err" id="errBox"></div>
  </div>

  <div class="loading" id="loadingBox">
    <div class="spinner"></div>
    <p>מכין תוכנית מותאמת אישית...</p>
  </div>

  <div class="result" id="result"></div>

  <div class="credit">תוכנית מופקת באמצעות בינה מלאכותית<br><strong>עומרי שגן — כושר אישי · עפולה</strong></div>
</div>

<script>
async function generate(){
  const age=document.getElementById('age').value;
  const level=document.getElementById('level').value;
  const goal=document.getElementById('goal').value;
  const days=document.getElementById('days').value;
  const equipment=document.getElementById('equipment').value;

  document.getElementById('btnGen').disabled=true;
  document.getElementById('errBox').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('loadingBox').style.display='block';

  const prompt=`אתה מאמן כושר מקצועי המתמחה בילדים ונוער. צור תוכנית אימון שבועית מפורטת:
- גיל: ${age}
- רמה: ${level}
- מטרה: ${goal}
- ימי אימון בשבוע: ${days}
- ציוד: ${equipment}

הנחיות:
1. חלק כל אימון לחלקי גוף (פלג עליון / פלג תחתון / כל הגוף) לפי מספר הימים.
2. לכל תרגיל: שם בעברית, סטים, חזרות (או שניות), הערת ביצוע קצרה.
3. סטים וחזרות מותאמים לגיל ולרמה.
4. חימום של 2-3 דקות לכל אימון.
5. 5-7 תרגילים לכל יום.

החזר JSON בלבד, ללא טקסט נוסף:
{"title":"כותרת","summary":"תיאור קצר","days":[{"day":"יום א׳","focus":"פלג גוף עליון","type":"upper","warmup":"תיאור חימום","exercises":[{"name":"שם","sets":3,"reps":"12","note":"הערה"}]}]}
type: upper/lower/full/cardio`;

  try{
    const resp=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt})
    });
    const data=await resp.json();
    if(data.error) throw new Error(data.error);
    renderPlan(data.plan);
  }catch(e){
    document.getElementById('loadingBox').style.display='none';
    document.getElementById('btnGen').disabled=false;
    const eb=document.getElementById('errBox');
    eb.textContent='אירעה שגיאה. נסו שנית.';
    eb.style.display='block';
  }
}

function focusClass(t){return{upper:'focus-upper',lower:'focus-lower',full:'focus-full',cardio:'focus-cardio'}[t]||'focus-full'}

function renderPlan(plan){
  document.getElementById('loadingBox').style.display='none';
  const res=document.getElementById('result');
  let html=`<div class="result-header">
    <div><div class="result-title">${plan.title}</div><div class="result-summary">${plan.summary}</div></div>
    <button class="btn-new" onclick="resetForm()">תוכנית חדשה</button>
  </div>`;
  plan.days.forEach(day=>{
    html+=`<div class="day-card">
      <div class="day-header"><div class="day-name">${day.day}</div><span class="day-focus ${focusClass(day.type)}">${day.focus}</span></div>
      <div class="warmup"><strong>חימום:</strong> ${day.warmup}</div>
      <table><thead><tr><th>תרגיל</th><th class="c">סטים</th><th class="c">חזרות</th></tr></thead><tbody>`;
    day.exercises.forEach(ex=>{
      html+=`<tr><td><div class="ex-name">${ex.name}</div><div class="ex-note">${ex.note||''}</div></td><td class="c sets-val">${ex.sets}</td><td class="c reps-val">${ex.reps}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  res.innerHTML=html;
  res.style.display='block';
  document.getElementById('btnGen').disabled=false;
}

function resetForm(){
  document.getElementById('result').style.display='none';
  document.getElementById('btnGen').disabled=false;
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
